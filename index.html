<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Simulator Pro · BSP - Accueil</title>
  <link rel="stylesheet" href="css/style.css">
  <body style="background: url('image/index.jpg') no-repeat center center fixed; background-size: cover;"></body>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏭</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100..900;1,100..900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div id="toast"></div>

<!-- POPUP DE RÉCAPITULATION DES QUÊTES -->
<div class="quest-complete-overlay" id="quest-complete-overlay">
  <div class="quest-complete-dialog">
    <div class="quest-complete-icon">🏆</div>
    <div class="quest-complete-title" id="quest-complete-title">Quête complétée !</div>
    <div class="quest-complete-desc" id="quest-complete-desc"></div>
    <div class="quest-complete-reward" id="quest-complete-reward"></div>
    <button class="quest-complete-btn" onclick="closeQuestCompletePopup()">Fermer</button>
  </div>
</div>

<!-- Musique d'ambiance -->
<audio id="ambiance-music" loop preload="auto" style="display: none;">
    <source src="sounds/ambiance.mp3" type="audio/mpeg">
</audio>

<!-- Menu Paramètres (popup) -->
<div class="settings-overlay" id="settings-overlay">
    <div class="settings-dialog">
        <div class="settings-header">
            <h3>⚙️ Paramètres</h3>
            <button class="settings-close" onclick="closeSettings()">✕</button>
        </div>
        <div class="settings-body">
            <div class="setting-item">
                <label>🔊 Volume des effets sonores</label>
                <input type="range" id="sound-volume" min="0" max="100" value="40">
                <span id="sound-volume-value">40%</span>
            </div>
            <div class="setting-item">
                <label>🎵 Volume de la musique d'ambiance</label>
                <input type="range" id="music-volume" min="0" max="100" value="10">
                <span id="music-volume-value">10%</span>
            </div>
            <div class="setting-item">
                <button class="tb-btn blue" onclick="testSound()">🔊 Tester le son</button>
            </div>
        </div>
        <div class="settings-footer">
            <button class="tb-btn green" onclick="closeSettings()">Fermer</button>
        </div>
    </div>
</div>

<!-- PASSWORD OVERLAY -->
<div class="password-overlay" id="password-overlay">
    <div class="password-dialog">
        <h3>🔐 Accès développeur</h3>
        <input type="password" class="password-input" id="debug-password" placeholder="••••" maxlength="4" autocomplete="off">
        <div style="display:flex;gap:10px">
            <button class="tb-btn" style="flex:1" onclick="closePasswordDialog()">Annuler</button>
            <button class="tb-btn green" style="flex:1" onclick="checkPassword()">Valider</button>
        </div>
    </div>
</div>

<!-- PAGE D'ACCUEIL -->
<div id="screen-menu" class="screen active">
  <div class="menu-background">
    <div class="menu-particles"></div>
    <div class="menu-overlay"></div>
  </div>
  <div class="menu-container-center">
    <div class="menu-center">
      <div class="menu-badge">⭐ BUSINESS SIMULATOR PRO ⭐</div>
      <h1 class="menu-title">BÂTISSEZ<br>VOTRE EMPIRE</h1>
      <div class="menu-divider"></div>
      <p class="menu-sub">Achetez, produisez, fixez vos prix, vendez.<br>Devenez le magnat de l'industrie.</p>
      <div class="menu-btns">
        <button class="menu-btn menu-btn-primary" onclick="startNewGame()">
          <span class="btn-icon">🚀</span>
          <span class="btn-text">NOUVELLE PARTIE</span>
        </button>
        <button class="menu-btn menu-btn-secondary" onclick="loadGame()">
          <span class="btn-icon">💾</span>
          <span class="btn-text">CHARGER</span>
        </button>
        <button class="menu-btn menu-btn-secondary" onclick="openSettings()">
          <span class="btn-icon">⚙️</span>
          <span class="btn-text">PARAMÈTRES</span>
        </button>
        <button class="menu-btn menu-btn-secondary" onclick="openTutorial()">
          <span class="btn-icon">📖</span>
          <span class="btn-text">TUTORIEL</span>
        </button>
        <button class="menu-btn menu-btn-danger" onclick="confirmQuitGame()">
          <span class="btn-icon">🚪</span>
          <span class="btn-text">QUITTER</span>
        </button>
      </div>
      <div class="menu-footer">
        <span>Create by CaraBulle</span>
        <span class="menu-version">v0.26.0</span>
      </div>
    </div>
  </div>
</div>

<!-- SCRIPTS -->
<script src="js/constants.js"></script>
<script src="js/utils.js"></script>
<script src="js/state.js"></script>
<script src="js/employees.js"></script>
<script src="js/production.js"></script>
<script src="js/market.js"></script>
<script src="js/sell.js"></script>
<script src="js/contracts.js"></script>
<script src="js/competitors.js"></script>
<script src="js/research.js"></script>
<script src="js/accounting.js"></script>
<script src="js/quests.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>
<script src="js/debug.js"></script>

<script>
// ==================== FONCTIONS DE L'ACCUEIL ====================

function startNewGame() {
    window.location.href = 'game.html?action=new';
}

function loadGame() {
    window.location.href = 'game.html?action=load';
}

function confirmQuitGame() {
    showConfirm('Quitter le jeu', 'Voulez-vous vraiment quitter ?', () => {
        window.close();
        document.body.innerHTML = '<div style="text-align:center;padding:50px;font-family:monospace"><h1>👋 Merci d\'avoir joué !</h1><p>Vous pouvez fermer cette fenêtre.</p></div>';
    });
}

function openSettings() {
    document.getElementById('settings-overlay').style.display = 'flex';
    loadSettings();
}

function closeSettings() {
    document.getElementById('settings-overlay').style.display = 'none';
}

function openTutorial() {
    let tutorialOverlay = document.getElementById('tutorial-overlay');
    if (tutorialOverlay) tutorialOverlay.style.display = 'flex';
}

function closeQuestCompletePopup() {
    document.getElementById('quest-complete-overlay').style.display = 'none';
}

function closePasswordDialog() {
    document.getElementById('password-overlay').style.display = 'none';
    document.getElementById('debug-password').value = '';
}

function checkPassword() {
    let password = document.getElementById('debug-password').value;
    if (password === '2291') {
        closePasswordDialog();
        if (typeof showDebugPanel === 'function') showDebugPanel();
    } else {
        toast('Mot de passe incorrect', 'err');
    }
}

// Gestion des paramètres de volume
window.soundVolume = 0.4;
window.musicVolume = 0.1;

function loadSettings() {
    let savedSound = localStorage.getItem('soundVolume');
    let savedMusic = localStorage.getItem('musicVolume');
    if (savedSound !== null) {
        window.soundVolume = parseFloat(savedSound);
        document.getElementById('sound-volume').value = window.soundVolume * 100;
        document.getElementById('sound-volume-value').textContent = Math.round(window.soundVolume * 100) + '%';
    }
    if (savedMusic !== null) {
        window.musicVolume = parseFloat(savedMusic);
        document.getElementById('music-volume').value = window.musicVolume * 100;
        document.getElementById('music-volume-value').textContent = Math.round(window.musicVolume * 100) + '%';
        let music = document.getElementById('ambiance-music');
        if (music) music.volume = window.musicVolume;
    }
}

function saveSoundVolume() {
    let value = parseInt(document.getElementById('sound-volume').value) / 100;
    window.soundVolume = value;
    localStorage.setItem('soundVolume', window.soundVolume);
    document.getElementById('sound-volume-value').textContent = Math.round(window.soundVolume * 100) + '%';
}

function saveMusicVolume() {
    let value = parseInt(document.getElementById('music-volume').value) / 100;
    window.musicVolume = value;
    localStorage.setItem('musicVolume', window.musicVolume);
    document.getElementById('music-volume-value').textContent = Math.round(window.musicVolume * 100) + '%';
    let music = document.getElementById('ambiance-music');
    if (music) music.volume = window.musicVolume;
}

function testSound() {
    let audio = new Audio('sounds/caisse.mp3');
    audio.volume = window.soundVolume;
    audio.play().catch(e => console.log("Audio play failed:", e));
}

document.addEventListener('DOMContentLoaded', function() {
    let soundSlider = document.getElementById('sound-volume');
    let musicSlider = document.getElementById('music-volume');
    if (soundSlider) soundSlider.addEventListener('input', saveSoundVolume);
    if (musicSlider) musicSlider.addEventListener('input', saveMusicVolume);
    loadSettings();
});

</script>
</body>
</html>
